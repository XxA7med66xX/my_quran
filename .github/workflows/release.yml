name: Build & Release

permissions:
    contents: write

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: "The tag name for the release (e.g., v1.0.0)"
                required: true
                type: string
            prerelease:
                description: "Set to true for a pre-release"
                required: false
                type: boolean
                default: false
            draft:
                description: "Set to true to create a draft release"
                required: false
                type: boolean
                default: false
    push:
        tags:
            - "v*"

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    get-version-info:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            build_number: ${{ steps.version.outputs.build_number }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get version from tag
              id: version
              run: |
                  version=${GITHUB_REF#refs/tags/}
                  echo "version=$version" >> $GITHUB_OUTPUT
                  echo "Release version: $version"
                  BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
                  BUILD_NUMBER=$((BUILD_NUMBER * 10 + 3))
                  echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
    build_android:
        name: Build Release APKs
        needs: [get-version-info]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Checkout reproducible-apk-tools
              uses: actions/checkout@v4
              with:
                  repository: obfusk/reproducible-apk-tools
                  ref: v0.3.0
                  path: reproducible-apk-tools

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Flutter Doctor
              id: flutter_doctor
              run: |
                  flutter doctor -v

            - name: Get Dependencies
              run: flutter pub get

            # --- SIGNING SETUP ---
            - name: Decode Keystore
              run: |
                  echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

            - name: Create key.properties
              run: |
                  echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
                  echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
                  echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
                  echo "storeFile=upload-keystore.jks" >> android/key.properties

            # --- BUILD APKs ---
            - name: Build Split APKs
              env:
                APP_VERSION: ${{ needs.get-version-info.outputs.version }}
                APP_BUILD: ${{ needs.get-version-info.outputs.build_number }}
              run: |
                flutter build apk --release --split-per-abi \
                  --dart-define=APP_VERSION="$APP_VERSION" \
                  --dart-define=APP_BUILD="$APP_BUILD"
            - name: Zipalign and Resign APKs
              run: |
                  # 1. Dynamically find the latest version of apksigner
                  # We look inside build-tools, sort in reverse to get the highest version, and pick the top one.
                  APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)

                  if [ -z "$APKSIGNER" ]; then
                    echo "Error: apksigner not found in $ANDROID_HOME/build-tools"
                    exit 1
                  fi

                  echo "Using apksigner: $APKSIGNER"

                  cd build/app/outputs/apk/release

                  for apk in *.apk; do
                    # --- Step A: Zipalign ---
                    mv "$apk" "${apk%.apk}-unaligned.apk"

                    python3 ${{ github.workspace }}/reproducible-apk-tools/zipalign.py \
                      --page-size 16 \
                      --pad-like-apksigner \
                      --replace \
                      "${apk%.apk}-unaligned.apk" \
                      "$apk"

                    rm "${apk%.apk}-unaligned.apk"

                    # --- Step B: Resign the APK ---
                    # Make sure your keystore path and secret names match your repo setup

                    "$APKSIGNER" sign \
                      --ks ${{ github.workspace }}/android/app/upload-keystore.jks \
                      --ks-pass pass:${{ secrets.ANDROID_STORE_PASSWORD }} \
                      --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
                      --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
                      "$apk"

                     # Verify it
                     "$APKSIGNER" verify --verbose "$apk"
                  done

            - name: Upload Android Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: apks
                  path: build/app/outputs/apk/release/*.apk

    build_linux_x86_64:
        name: Build Release Linux
        needs: [get-version-info]
        runs-on: ubuntu-22.04
        env:
          WORKING_DIR: build/linux/x64/release/bundle

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version-file: pubspec.yaml
                  cache: true
            
            - name: Install dependencies
              run: |
                flutter pub get
                sudo apt update && sudo apt install -y \
                clang \
                cmake \
                ninja-build \
                libgtk-3-dev \
                libfuse2 \
                appstream

            - name: Build Linux App
              env:
                APP_VERSION: ${{ needs.get-version-info.outputs.version }}
                APP_BUILD: ${{ needs.get-version-info.outputs.build_number }}
              run: |
                flutter build linux --release \
                  --dart-define=APP_VERSION="${{ env.APP_VERSION }}" \
                  --dart-define=APP_BUILD="${{ env.APP_BUILD }}"
            
            - name: Get version from pubspec.yaml
              id: get_version
              run: |
                VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' pubspec.yaml)
                echo "VERSION=$VERSION" >> $GITHUB_ENV   

            - name: Create portable version
              run: |
                cp assets/icon-cricle.png ${{ env.WORKING_DIR }}/my_quran.png
                tar -cvzf MyQuran-${VERSION}-linux-x86_64.tar.gz -C ${{ env.WORKING_DIR }} .  
            
            - name: Prepare AppDir for packaging as an AppImage
              run: |
                mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
                
                cp -r ${{ env.WORKING_DIR }}/* AppDir/
                cp linux/packaging/my_quran.desktop AppDir/
                cp linux/packaging/appimage/AppRun AppDir/
                cp ${{ env.WORKING_DIR }}/my_quran.png AppDir/usr/share/icons/hicolor/512x512/apps

            - name: Install appimagetool (For packaging as an appimage)
              run: |
                curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
                chmod +x appimagetool
            
            - name: Build Appimage
              run: ./appimagetool AppDir/ MyQuran-${VERSION}-linux-x86_64.AppImage
              
            - name: Upload Android Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: linuxBuilds_x64_86
                  path: |
                    *linux-x86_64.tar.gz
                    *linux-x86_64.AppImage

    build_windows_x86_64:
        name: Build Release windows
        needs: [get-version-info]
        runs-on: windows-2022
        env:
          WORKING_DIR: build/windows/x64/runner/Release/

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version-file: pubspec.yaml
                  cache: true
            
            - name: Install dependencies
              run: flutter pub get

            - name: Get version from pubspec.yaml
              shell: pwsh
              run: |
                $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*([0-9]+\.[0-9]+\.[0-9]+)'
                if ($versionLine -match '([0-9]+\.[0-9]+\.[0-9]+)') {
                    $VERSION = $Matches[1]
                    echo "VERSION=$VERSION" >> $env:GITHUB_ENV
                } else {
                    Write-Error "Version not found in pubspec.yaml"
                }  

            - name: Build Windows App
              env:
                APP_VERSION: ${{ needs.get-version-info.outputs.version }}
                APP_BUILD: ${{ needs.get-version-info.outputs.build_number }}
              run: |
                flutter build windows --release `
                  --dart-define=APP_VERSION="${{ env.APP_VERSION }}" `
                  --dart-define=APP_BUILD="${{ env.APP_BUILD }}"
            
            # See https://docs.flutter.dev/platform-integration/windows/building#building-your-own-zip-file-for-windows      
            - name: Add runtime files
              run: |
                Copy-Item "C:\Windows\System32\msvcp140.dll" "${{env.WORKING_DIR}}"
                Copy-Item "C:\Windows\System32\vcruntime140.dll" "${{env.WORKING_DIR}}"
                Copy-Item "C:\Windows\System32\vcruntime140_1.dll" "${{env.WORKING_DIR}}"
            
            - name: Add app icon
              run: Copy-Item assets/icon-cricle.png ${{env.WORKING_DIR}}/my_quran.png

            - name: Create portable version
              run: Compress-Archive -Path "${{env.WORKING_DIR}}*" -DestinationPath "MyQuran-$env:VERSION-windows-x86_64.zip"
            
            - name: Create app installer (setup)
              run: iscc /DMyAppVersion=$env:VERSION windows/packaging/inno-setup.iss
              
            - name: Upload Windows Artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: windowsBuilds_x64_86
                  path: |
                    *windows-x86_64.zip
                    *windows-x86_64-setup.exe  
    release:
        name: Publish Release
        needs: [build_android, build_linux_x86_64, build_windows_x86_64, get-version-info]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - uses: actions/download-artifact@v7
              with:
                  name: apks
                  path: artifacts
            
            - uses: actions/download-artifact@v7
              with:
                  name: linuxBuilds_x64_86
                  path: artifacts

            - uses: actions/download-artifact@v7
              with:
                  name: windowsBuilds_x64_86
                  path: artifacts      

            - name: Create GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ github.event.inputs.tag_name }}
                  prerelease: ${{ github.event.inputs.prerelease }}
                  draft: ${{ github.event.inputs.draft }}
                  bodyFile: fastlane/metadata/android/en-US/changelogs/${{ needs.get-version-info.outputs.build_number }}.txt
                  artifacts: >
                    artifacts/*.apk,
                    artifacts/*.tar.gz,
                    artifacts/*.AppImage,
                    artifacts/*.zip,
                    artifacts/*.exe
                  token: ${{ secrets.GITHUB_TOKEN }}
                 
    build_web_artifact:
        name: Build Web Artifact
        needs: get-version-info
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Get Dependencies
              run: flutter pub get

            - name: Configure GitHub Pages
              id: pages
              uses: actions/configure-pages@v4

            - name: Build Web App
              env:
                APP_VERSION: ${{ needs.get-version-info.outputs.version }}
                APP_BUILD: ${{ needs.get-version-info.outputs.build_number }}
              run: |
                flutter build web --pwa-strategy=offline-first \
                  --base-href "${{ steps.pages.outputs.base_path }}/" \
                  --dart-define=APP_VERSION="$APP_VERSION" \
                  --dart-define=APP_BUILD="$APP_BUILD"

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./build/web"

    deploy_pages:
        needs: build_web_artifact
        name: Deploy to GitHub Pages
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4